<div class="card" style="max-width: 400px; margin: 50px auto;">
  <h2>Registro de Usuario</h2>
  
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="full_name">Nombre Completo</label>
      <input 
        type="text" 
        id="full_name" 
        formControlName="full_name" 
        class="form-control"
        placeholder="Juan Pérez">
      <div class="error-message" *ngIf="registerForm.get('full_name')?.invalid && registerForm.get('full_name')?.touched">
        Nombre completo es requerido
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input 
        type="email" 
        id="email" 
        formControlName="email" 
        class="form-control"
        placeholder="correo@ejemplo.com">
      <div class="error-message" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        Email válido es requerido
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input 
        type="password" 
        id="password" 
        formControlName="password" 
        class="form-control"
        placeholder="Mínimo 6 caracteres">
      <div class="error-message" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        Contraseña requerida (mínimo 6 caracteres)
      </div>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirmar Contraseña</label>
      <input 
        type="password" 
        id="confirm_password" 
        formControlName="confirm_password" 
        class="form-control"
        placeholder="Repite tu contraseña">
      <div class="error-message" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirm_password')?.touched">
        Las contraseñas no coinciden
      </div>
    </div>

    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <button type="submit" class="btn btn-primary" [disabled]="loading" style="width: 100%">
      {{ loading ? 'Cargando...' : 'Registrarse' }}
    </button>
  </form>

  <p style="margin-top: 20px; text-align: center;">
    ¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión aquí</a>
  </p>
</div>
