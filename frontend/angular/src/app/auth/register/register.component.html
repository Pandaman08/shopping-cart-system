<section class="register-page">
  <div class="register-backdrop"></div>

  <div class="register-wrapper">
    <header class="register-header">
      <div class="register-logo">SC</div>
      <h1>Crear Cuenta</h1>
      <p>Únete a la comunidad y empieza a comprar en minutos.</p>
    </header>

    <article class="register-card">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        <div class="form-group">
          <label for="full_name">Nombre completo</label>
          <input
            type="text"
            id="full_name"
            formControlName="full_name"
            placeholder="Juan Pérez"
            class="form-input"
          />
          <p *ngIf="registerForm.get('full_name')?.invalid && registerForm.get('full_name')?.touched" class="field-error">
            Ingresa tu nombre completo.
          </p>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="correo@ejemplo.com"
            class="form-input"
          />
          <p *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="field-error">
            Ingresa un correo válido.
          </p>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
            class="form-input"
          />
          <p *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="field-error">
            La contraseña debe tener al menos 6 caracteres.
          </p>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirmar contraseña</label>
          <input
            type="password"
            id="confirm_password"
            formControlName="confirm_password"
            placeholder="Repite tu contraseña"
            class="form-input"
          />
          <p *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirm_password')?.touched" class="field-error">
            Las contraseñas no coinciden.
          </p>
        </div>

        <div *ngIf="errorMessage" class="auth-error">
          <p class="auth-error-title">No se pudo crear la cuenta</p>
          <p class="auth-error-text">{{ errorMessage }}</p>
        </div>

        <button type="submit" [disabled]="loading || registerForm.invalid" class="submit-btn">
          <span *ngIf="!loading">Crear cuenta</span>
          <span *ngIf="loading">Creando cuenta...</span>
        </button>
      </form>

      <div class="divider"><span>O</span></div>

      <p class="login-link">
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </p>
    </article>
  </div>
</section>
