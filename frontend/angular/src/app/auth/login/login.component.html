<section class="login-page">
  <div class="login-backdrop"></div>

  <div class="login-wrapper">
    <header class="login-header">
      <div class="login-logo">SC</div>
      <h1>Bienvenido</h1>
      <p>Inicia sesión para continuar</p>
    </header>

    <article class="login-card">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="correo@ejemplo.com"
            class="form-input"
          />
          <p
            *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            class="field-error"
          >
            Ingresa un correo válido.
          </p>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
            class="form-input"
          />
          <p
            *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            class="field-error"
          >
            La contraseña es obligatoria (mínimo 6 caracteres).
          </p>
        </div>

        <div *ngIf="errorMessage" class="auth-error">
          <p class="auth-error-title">Error de autenticación</p>
          <p class="auth-error-text">{{ errorMessage }}</p>
        </div>

        <button
          type="submit"
          [disabled]="loading || loginForm.invalid"
          class="submit-btn"
        >
          <span *ngIf="!loading">Iniciar sesión</span>
          <span *ngIf="loading">Cargando...</span>
        </button>
      </form>

      <div class="divider"><span>O</span></div>

      <p class="register-link">
        ¿No tienes cuenta?
        <a routerLink="/register">Regístrate aquí</a>
      </p>
    </article>

    <footer class="login-hint">
      Credenciales de prueba: <strong>admin&#64;example.com</strong> / <strong>admin123</strong>
    </footer>
  </div>
</section>
