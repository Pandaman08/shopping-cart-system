<div *ngIf="loading" class="loading">
  Cargando detalles del producto...
</div>

<div *ngIf="!loading && product" class="product-detail">
  <div class="product-detail-image">
    <img [src]="product.image_url || 'https://via.placeholder.com/500x500?text=Producto'" 
         [alt]="product.name">
  </div>
  
  <div class="product-detail-info">
    <h1>{{ product.name }}</h1>
    <p class="category" *ngIf="product.category_name">
      Categoría: {{ product.category_name }}
    </p>
    <p class="description">{{ product.description }}</p>
    
    <div class="price-section">
      <span class="price">{{ product.price | currency:'USD':'symbol':'1.2-2' }}</span>
      <span class="stock" [class.low-stock]="product.stock < 10">
        Stock disponible: {{ product.stock }} unidades
      </span>
    </div>
    
    <div class="quantity-selector" *ngIf="product.stock > 0">
      <button (click)="updateQuantity(-1)" [disabled]="quantity <= 1">-</button>
      <input type="number" [(ngModel)]="quantity" min="1" [max]="product.stock">
      <button (click)="updateQuantity(1)" [disabled]="quantity >= product.stock">+</button>
    </div>
    
    <button class="btn btn-primary btn-large" 
            (click)="addToCart()"
            [disabled]="product.stock === 0">
      {{ product.stock === 0 ? 'Agotado' : 'Agregar al Carrito' }}
    </button>
    
    <button class="btn btn-secondary" routerLink="/products">
      Seguir Comprando
    </button>
  </div>
</div>
